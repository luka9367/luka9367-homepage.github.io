<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="Portrait of Jiaxu Fan">
  <defs>
    <!-- Background gradient: deep navy → midnight blue (academic / Oxford-style) -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0B1A2E"/>
      <stop offset="100%" stop-color="#163560"/>
    </linearGradient>

    <!-- Top-left soft light: mimics natural window light -->
    <radialGradient id="glow" cx="0.28" cy="0.18" r="0.85">
      <stop offset="0%"  stop-color="#3D6CA8" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#1A3A6E" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#0B1A2E" stop-opacity="0"/>
    </radialGradient>

    <!-- Gold accent for corner marks and monogram -->
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#EBD9A8"/>
      <stop offset="100%" stop-color="#B5853B"/>
    </linearGradient>

    <!-- Skin tone gradient (warm, photographic) -->
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F2D9B5"/>
      <stop offset="100%" stop-color="#D9B68A"/>
    </linearGradient>

    <!-- Hair: deep brown-black -->
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1F1812"/>
      <stop offset="100%" stop-color="#0A0805"/>
    </linearGradient>

    <!-- Subtle paper grain -->
    <pattern id="grain" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="transparent"/>
      <circle cx="1.5" cy="1.5" r="0.35" fill="rgba(255,255,255,0.03)"/>
    </pattern>

    <!-- Soft drop shadow for face -->
    <radialGradient id="faceShadow" cx="0.5" cy="0.55" r="0.5">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <!-- ===== Base background ===== -->
  <rect width="240" height="240" fill="url(#bg)"/>
  <rect width="240" height="240" fill="url(#glow)"/>
  <rect width="240" height="240" fill="url(#grain)"/>

  <!-- ===== Gold corner marks (card-style) ===== -->
  <g stroke="url(#gold)" stroke-width="2.4" stroke-linecap="round" fill="none">
    <line x1="20" y1="20" x2="40" y2="20"/>
    <line x1="20" y1="20" x2="20" y2="40"/>

    <line x1="200" y1="20" x2="220" y2="20"/>
    <line x1="220" y1="20" x2="220" y2="40"/>

    <line x1="20" y1="200" x2="20" y2="220"/>
    <line x1="20" y1="220" x2="40" y2="220"/>

    <line x1="220" y1="200" x2="220" y2="220"/>
    <line x1="200" y1="220" x2="220" y2="220"/>
  </g>

  <!-- ===== Soft shoulder shadow (sits behind head, gives depth) ===== -->
  <ellipse cx="120" cy="240" rx="120" ry="80" fill="#000" opacity="0.18"/>

  <!-- ===== Shoulders / Suit (academic blazer) ===== -->
  <path d="M 40 240 C 40 178, 80 162, 120 162 C 160 162, 200 178, 200 240 Z"
        fill="#0B1220"/>
  <!-- Shirt collar (subtle white triangle) -->
  <path d="M 102 168 L 120 184 L 138 168 L 134 188 L 106 188 Z" fill="#E8D9B5" opacity="0.95"/>
  <!-- Tie (deep navy with gold pattern) -->
  <path d="M 114 184 L 126 184 L 130 230 L 120 240 L 110 230 Z" fill="#0F2A47"/>
  <path d="M 120 192 L 124 200 L 120 208 L 116 200 Z" fill="url(#gold)" opacity="0.7"/>
  <path d="M 120 212 L 124 220 L 120 228 L 116 220 Z" fill="url(#gold)" opacity="0.7"/>
  <!-- Lapel highlight -->
  <path d="M 100 175 L 80 195 L 90 200 L 110 180 Z" fill="#1A2A40" opacity="0.7"/>
  <path d="M 140 175 L 160 195 L 150 200 L 130 180 Z" fill="#1A2A40" opacity="0.7"/>

  <!-- ===== Neck ===== -->
  <path d="M 108 152 L 108 175 C 108 180, 132 180, 132 175 L 132 152 Z"
        fill="url(#skin)"/>
  <!-- Neck shadow under jaw -->
  <path d="M 108 152 L 108 165 C 116 168, 124 168, 132 165 L 132 152 Z"
        fill="#9C7855" opacity="0.45"/>

  <!-- ===== Head / face ===== -->
  <ellipse cx="120" cy="100" rx="38" ry="46" fill="url(#skin)"/>
  <!-- Face soft shadow (right side, light from upper-left) -->
  <ellipse cx="120" cy="100" rx="38" ry="46" fill="url(#faceShadow)"/>

  <!-- Subtle facial features: brow line -->
  <path d="M 100 88 Q 108 84 116 88" stroke="#3A2A1A" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 124 88 Q 132 84 140 88" stroke="#3A2A1A" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Eyes (small, refined) -->
  <ellipse cx="110" cy="98" rx="2.4" ry="1.6" fill="#1A1208"/>
  <ellipse cx="130" cy="98" rx="2.4" ry="1.6" fill="#1A1208"/>
  <!-- Eye highlights -->
  <circle cx="110.7" cy="97.5" r="0.5" fill="#FFF" opacity="0.9"/>
  <circle cx="130.7" cy="97.5" r="0.5" fill="#FFF" opacity="0.9"/>

  <!-- Nose (subtle) -->
  <path d="M 120 102 Q 118 115 116 120 Q 120 122 124 120 Q 122 115 120 102"
        fill="#C49A6A" opacity="0.55"/>

  <!-- Mouth (slight, confident) -->
  <path d="M 112 128 Q 120 132 128 128" stroke="#6B3A28" stroke-width="1.4"
        fill="none" stroke-linecap="round" opacity="0.85"/>

  <!-- ===== Hair ===== -->
  <path d="M 84 90
           Q 80 65 100 56
           Q 120 48 140 56
           Q 162 64 158 92
           Q 156 80 148 76
           Q 140 72 132 72
           Q 130 78 124 80
           Q 118 76 110 80
           Q 102 78 96 80
           Q 88 82 84 90 Z"
        fill="url(#hair)"/>
  <!-- Hair texture lines -->
  <path d="M 92 78 Q 110 68 130 70" stroke="#3A2A1A" stroke-width="0.6" fill="none" opacity="0.5"/>
  <path d="M 88 86 Q 110 76 132 78" stroke="#3A2A1A" stroke-width="0.6" fill="none" opacity="0.4"/>

  <!-- ===== Subtle earring hint (single, refined) — omitted for academic neutrality ===== -->

  <!-- ===== Bottom academic monogram bar ===== -->
  <g transform="translate(120, 215)">
    <line x1="-30" y1="0" x2="-14" y2="0" stroke="url(#gold)" stroke-width="1" opacity="0.7"/>
    <text x="0" y="4" text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif" font-weight="700"
          font-size="13" letter-spacing="3" fill="url(#gold)">JIAFAN</text>
    <line x1="14" y1="0" x2="30" y2="0" stroke="url(#gold)" stroke-width="1" opacity="0.7"/>
  </g>

  <!-- ===== Tiny academic cap above hair — evokes "scholar" ===== -->
  <g transform="translate(120, 38)" fill="url(#gold)">
    <polygon points="-14,-2 0,-10 14,-2"/>
    <rect x="-12" y="-1" width="24" height="2.4" rx="0.6"/>
    <line x1="12" y1="0.4" x2="20" y2="6" stroke="url(#gold)" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="20" cy="6" r="1.3" fill="url(#gold)"/>
  </g>
</svg>
