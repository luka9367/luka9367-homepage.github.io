  role_extra       : "(starting Fall 2026)"
  institution      : "The Chinese University of Hong Kong, Shenzhen"
  school           : "School of Science and Engineering"
  department_short : "SSE"
  location         : "Shenzhen, China"
  email_obfuscated : true
  email_user       : "2041165290"
  email_domain     : "qq.com"
  cv               : "files/cv.pdf"
  github           : "luka9367"
  scholar          : "YOUR_GOOGLE_SCHOLAR_ID"
  orcid            : "0000-0000-0000-0000"
