  # One-line research statement shown in the hero
  research_tagline : "I build open, reproducible AI tools — turning free, open-weight generative models into research-ready systems for science and education."

  # Quick "open to" signals (the user is hunting for AI research intern roles)
  open_to:
    - "AI Algorithm Intern"
    - "Product Operations Intern"
