  # Research interests — icon + label + 1-line description
  interests:
    - { icon: "search",  label: "AI-augmented Search",    blurb: "Grounded citation, RAG, conversational IR." }
    - { icon: "image",   label: "Multi-modal Generation", blurb: "Controllable image & figure synthesis for academic publishing." }
    - { icon: "hci",     label: "HCI for AI Tools",       blurb: "Affordances for non-engineer creators." }
    - { icon: "eval",    label: "Evaluation & QA",        blurb: "12-dimensional quality assessment of generative outputs." }
    - { icon: "code",    label: "Open-source Tooling",    blurb: "Reproducible AI pipelines wrapped around free public models." }
    - { icon: "math",    label: "Numerical Optimization", blurb: "Matrix computation &amp; nonlinear complementarity problems." }

# Reading Files
include:
  - .htaccess
  - _pages
  - files
  - assets
exclude:
  - docs
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - .github
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - Rakefile
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor
  - deploy.ps1
  - serve.ps1
  - DEPLOY.md
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default
      author_profile: false
  - scope:
      path: ""
    values:
      layout: default

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed
  load_paths:
    - _sass

# Outputting
permalink: /:categories/:title/
timezone: Asia/Shanghai

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
  - jekyll-seo-tag

